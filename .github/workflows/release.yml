name: Android Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── FFmpeg build (cached to skip repeat compilations) ──
      - name: Cache FFmpeg build
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: |
            ffmpeg-decoder/src/main/jni/
            ffmpeg-decoder/src/main/java/androidx/media3/decoder/ffmpeg/Ffmpeg*.java
            ffmpeg-decoder/src/main/java/androidx/media3/decoder/ffmpeg/ExperimentalFfmpegVideoRenderer.java
            ffmpeg-decoder/src/main/java/androidx/media3/decoder/ffmpeg/package-info.java
          key: ffmpeg-ndk26d-v4

      - name: Set up Android SDK + NDK
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.3.11579264'

      - name: Build FFmpeg decoder extension
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          chmod +x scripts/setup_ffmpeg.sh
          bash scripts/setup_ffmpeg.sh "$ANDROID_NDK_HOME"

      # ── App build ──
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode Firebase config
        shell: bash
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Decode Android signing keystore
        shell: bash
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/keystore/release.jks

      - name: Build signed release APK
        env:
          KANDALOO_KEYSTORE_FILE: ${{ github.workspace }}/app/keystore/release.jks
          KANDALOO_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KANDALOO_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KANDALOO_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK artifact
        shell: bash
        run: |
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/KanDaloo-${{ github.ref_name }}.apk

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          overwrite_files: true
          files: app/build/outputs/apk/release/KanDaloo-${{ github.ref_name }}.apk